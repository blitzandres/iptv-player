<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root{
  --bg:#000;--surface:#0c0c0d;--card:#181818;
  --border:rgba(255,255,255,0.07);
  --accent:#e11d48;--accent-dim:rgba(225,29,72,.10);--accent-glow:rgba(225,29,72,.18);
  --t1:#f8fafc;--t2:#94a3b8;--t3:#4b5563;
  --gold:#f59e0b;--green:#22c55e;
  --sw:270px;--th:52px;--ph:50px;--r:8px;--rs:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:'Inter',-apple-system,sans-serif;display:flex;flex-direction:column;font-size:14px;-webkit-font-smoothing:antialiased}

/* Topbar */
.topbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px;flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap;user-select:none;letter-spacing:-.02em}
.search-wrap{flex:1;max-width:320px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
#search{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px 8px 32px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
#search:focus{border-color:rgba(225,29,72,.35)}
#search::placeholder{color:var(--t3)}
.tb-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.fsel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;color:var(--t2);font-size:12px;font-family:inherit;outline:none;cursor:pointer;max-width:160px;transition:border-color .15s}
.fsel:focus{border-color:rgba(225,29,72,.35)}
.fsel option{background:#181818}
.ch-count{font-size:11px;color:var(--t3);white-space:nowrap;font-variant-numeric:tabular-nums;min-width:46px;text-align:right}
.icon-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);color:var(--t3);padding:5px 8px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;display:flex;align-items:center;gap:4px;transition:color .15s,border-color .15s;white-space:nowrap}
.icon-btn:hover{color:var(--t1);border-color:var(--t2)}
.icon-btn svg{width:12px;height:12px}

/* Layout */
.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:var(--sw);flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface)}
.qtabs{display:flex;gap:3px;padding:8px 10px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border);scrollbar-width:none}
.qtabs::-webkit-scrollbar{display:none}
.qtab{background:none;border:1px solid transparent;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;font-family:inherit;color:var(--t3);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.qtab:hover{color:var(--t2);border-color:var(--border)}
.qtab.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(225,29,72,.25)}
.ch-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#252538 transparent}
.ch-list::-webkit-scrollbar{width:3px}
.ch-list::-webkit-scrollbar-thumb{background:#252538;border-radius:2px}

/* Channel item */
.ch-item{display:flex;align-items:center;gap:9px;padding:7px 10px 7px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.025);transition:background .1s;position:relative;min-height:50px}
.ch-item:hover{background:rgba(255,255,255,.033)}
.ch-item.on{background:var(--accent-dim);border-left:2.5px solid var(--accent);padding-left:9.5px}
.ch-logo-box{width:40px;height:28px;flex-shrink:0;background:var(--card);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ch-logo{width:38px;height:26px;object-fit:contain}
.ch-logo-ph{width:16px;height:16px;color:var(--t3)}
.ch-info{flex:1;min-width:0}
.ch-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;color:var(--t1)}
.ch-grp{font-size:10.5px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;line-height:1}
.ch-actions{display:flex;align-items:center;gap:1px;flex-shrink:0}
.ch-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s,opacity .15s}
.ch-fav{color:var(--t3);opacity:.4}
.ch-fav:hover{color:var(--gold);background:rgba(245,158,11,.1);opacity:1}
.ch-fav.on{color:var(--gold);opacity:1}
.ch-del{color:var(--t3);opacity:0}
.ch-item:hover .ch-del{opacity:.4}
.ch-del:hover{color:var(--accent);background:var(--accent-dim);opacity:1!important}

/* Player area */
.player-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;min-width:0}
.video-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
video{width:100%;height:100%;object-fit:contain;display:none}
.no-ch{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--t3);user-select:none;pointer-events:none;text-align:center}
.no-ch svg{width:52px;height:52px;opacity:.12}
.no-ch p{font-size:15px;font-weight:500;opacity:.5}
.no-ch small{font-size:11px;opacity:.28;line-height:1.6}
.spinner{position:absolute;width:32px;height:32px;border:2px solid rgba(255,255,255,.07);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Player bar */
.player-bar{height:var(--ph);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0}
.pb-logo-box{width:38px;height:26px;background:var(--card);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.pb-logo{width:36px;height:24px;object-fit:contain}
.pb-info{flex:1;min-width:0}
.pb-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pb-grp{font-size:10px;color:var(--t3);margin-top:1px}
.live-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--green);padding:3px 8px;background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.2);border-radius:20px;letter-spacing:.03em;white-space:nowrap;flex-shrink:0}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.pb-btns{display:flex;align-items:center;gap:3px;flex-shrink:0}
.pb-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);padding:5px 9px;font-size:11.5px;font-family:inherit;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;user-select:none;min-height:28px}
.pb-btn svg{width:12px;height:12px;flex-shrink:0}
.pb-btn:hover:not(:disabled){background:#1a1a2e;color:var(--t1);border-color:rgba(255,255,255,.14)}
.pb-btn:disabled{opacity:.3;cursor:not-allowed}
.pb-btn.fav-on{background:rgba(245,158,11,.1);color:var(--gold);border-color:rgba(245,158,11,.22)}
.pb-btn.danger{color:#f87171}
.pb-btn.danger:hover:not(:disabled){background:var(--accent-dim);border-color:rgba(225,29,72,.25);color:#fc8585}

/* Error banner */
.err-toast{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(8,8,14,.93);backdrop-filter:blur(10px);border:1px solid rgba(225,29,72,.35);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--t1);white-space:nowrap;z-index:30;display:flex;align-items:center;gap:10px;box-shadow:0 6px 28px rgba(0,0,0,.55);animation:slideUp .2s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.err-toast .t-btn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);color:var(--t1);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:11px;font-family:inherit;transition:background .15s}
.err-toast .t-btn:hover{background:rgba(255,255,255,.16)}

/* Toasts */
.toast-wrap{position:fixed;bottom:calc(var(--ph) + 10px);right:14px;z-index:99;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;font-size:12px;color:var(--t1);box-shadow:0 4px 20px rgba(0,0,0,.45);animation:tIn .18s ease-out;pointer-events:auto;display:flex;align-items:center;gap:7px;max-width:280px;line-height:1.4}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--accent)}
.toast.info{border-left:3px solid #6366f1}
.toast.out{animation:tOut .18s ease-in forwards}
@keyframes tIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{to{opacity:0;transform:translateX(14px)}}

/* Overlay / Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.76);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease}
.overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:22px 24px;width:380px;max-width:calc(100vw - 28px);box-shadow:0 24px 64px rgba(0,0,0,.6);animation:scaleIn .15s ease}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-head h3{font-size:14px;font-weight:600}
.modal-close{background:none;border:none;color:var(--t3);cursor:pointer;padding:3px;display:flex;align-items:center;border-radius:3px;transition:color .15s}
.modal-close:hover{color:var(--t1)}
.sc-grid{display:grid;grid-template-columns:auto 1fr;row-gap:9px;column-gap:14px;align-items:center}
.kbd{background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:3px 7px;font-size:11px;font-weight:600;font-family:inherit;color:var(--t1);white-space:nowrap;justify-self:start}
.sc-desc{font-size:12px;color:var(--t2)}

/* Playlist modal */
.pl-label{display:block;font-size:10.5px;font-weight:600;color:var(--t2);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.pl-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px;color:var(--t1);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s;margin-bottom:14px}
.pl-input:focus{border-color:rgba(225,29,72,.4)}
.pl-input::placeholder{color:var(--t3)}
.pl-or{text-align:center;font-size:11px;color:var(--t3);margin:4px 0 14px;position:relative}
.pl-or::before,.pl-or::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.pl-or::before{left:0}.pl-or::after{right:0}
.pl-actions{display:flex;gap:8px;margin-top:4px}
.pl-btn{flex:1;padding:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.pl-btn:hover{background:#1a1a2e;color:var(--t1);border-color:rgba(255,255,255,.14)}
.pl-btn.primary{background:var(--accent-dim);border-color:rgba(225,29,72,.3);color:var(--accent)}
.pl-btn.primary:hover{background:rgba(225,29,72,.18)}

/* Misc */
.empty{padding:28px 14px;text-align:center;color:var(--t3);font-size:12px;line-height:1.7}
.hidden{display:none!important}

@media(max-width:600px){
  :root{--sw:210px}
  .tb-right .fsel,.ch-count{display:none}
  .icon-btn span{display:none}
}
@media(max-width:400px){
  :root{--sw:180px}
  .pb-btn:not(#btn-prev):not(#btn-next):not(#btn-fav) span{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
    IPTV
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search channels… (/)" oninput="debouncedFilter()" autocomplete="off" spellcheck="false">
  </div>
  <div class="tb-right">
    <select class="fsel" id="group-filter" onchange="filterChannels()">
      <option value="">All countries</option>
    </select>
    <span class="ch-count" id="ch-count"></span>
    <button class="icon-btn" onclick="showPlModal()" title="Load M3U playlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Load</span>
    </button>
    <button class="icon-btn" onclick="showModal()" title="Keyboard shortcuts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.001M10 8h.001M14 8h.001M18 8h.001M8 12h.001M12 12h.001M16 12h.001M7 16h10"/></svg>
      <span>Keys</span>
    </button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="qtabs" id="qtabs"></div>
    <div class="ch-list" id="ch-list"></div>
  </div>

  <div class="player-area">
    <div class="video-wrap" id="vwrap">
      <div class="no-ch" id="no-ch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <p>Pick a channel</p>
        <small>↑ ↓ to navigate · / to search<br>Load a .m3u to add more channels</small>
      </div>
      <div class="spinner" id="spinner"></div>
      <video id="video" controls playsinline></video>
    </div>

    <div class="player-bar">
      <div class="pb-logo-box" id="pb-logo-box" style="display:none">
        <img class="pb-logo" id="pb-logo" src="" alt="" onerror="this.style.display='none'">
      </div>
      <div class="pb-info" id="pb-info" style="display:none">
        <div class="pb-name" id="pb-name"></div>
        <div class="pb-grp" id="pb-grp"></div>
      </div>
      <div class="live-badge hidden" id="live-badge">
        <div class="live-dot"></div>LIVE
      </div>
      <div class="pb-btns">
        <button class="pb-btn" id="btn-prev" onclick="prevCh()" disabled title="Previous ↑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="pb-btn" id="btn-next" onclick="nextCh()" disabled title="Next ↓">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="pb-btn" id="btn-fav" onclick="toggleActiveFav()" disabled title="Favorite (F)">
          <svg id="fav-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span id="fav-lbl">Fav</span>
        </button>
        <button class="pb-btn" id="btn-copy" onclick="copyUrl()" disabled title="Copy stream URL">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>URL</span>
        </button>
        <button class="pb-btn danger" id="btn-dead" onclick="deleteActiveCh()" disabled title="Remove channel">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>Remove</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<!-- Shortcuts modal -->
<div class="overlay hidden" id="modal" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <div class="modal-head">
      <h3>Keyboard Shortcuts</h3>
      <button class="modal-close" onclick="hideModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sc-grid">
      <span class="kbd">↑ / ↓</span><span class="sc-desc">Previous / Next channel</span>
      <span class="kbd">/</span><span class="sc-desc">Focus search</span>
      <span class="kbd">Esc</span><span class="sc-desc">Clear search / close modal</span>
      <span class="kbd">Space</span><span class="sc-desc">Play / Pause</span>
      <span class="kbd">F</span><span class="sc-desc">Toggle favorite</span>
      <span class="kbd">M</span><span class="sc-desc">Mute / Unmute</span>
      <span class="kbd">Del</span><span class="sc-desc">Remove dead channel</span>
      <span class="kbd">?</span><span class="sc-desc">Show this panel</span>
    </div>
  </div>
</div>

<!-- Load playlist modal -->
<div class="overlay hidden" id="pl-modal" onclick="if(event.target===this)hidePlModal()">
  <div class="modal">
    <div class="modal-head">
      <h3>Load Playlist</h3>
      <button class="modal-close" onclick="hidePlModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <label class="pl-label">Remote URL</label>
    <input type="url" class="pl-input" id="pl-url" placeholder="https://example.com/playlist.m3u">
    <div class="pl-or">or</div>
    <label class="pl-label">Local File</label>
    <input type="file" class="pl-input" id="pl-file" accept=".m3u,.m3u8" style="padding:6px 10px;cursor:pointer">
    <div class="pl-actions">
      <button class="pl-btn" onclick="hidePlModal()">Cancel</button>
      <button class="pl-btn primary" onclick="loadPlaylist()">Load</button>
    </div>
  </div>
</div>

<script>
const HLS_CFG={maxBufferLength:20,maxMaxBufferLength:40,maxBufferSize:30e6,startLevel:-1,abrEwmaDefaultEstimate:1e6,startFragPrefetch:true,lowLatencyMode:false};
const MAX_ERRORS=3,AUTO_DEL_DELAY=8000,LOAD_TIMEOUT=12000;
const FLAGS={'Argentina':'🇦🇷','Bolivia':'🇧🇴','Brazil':'🇧🇷','Chile':'🇨🇱','Colombia':'🇨🇴','Costa Rica':'🇨🇷','Cuba':'🇨🇺','Dominican Republic':'🇩🇴','Ecuador':'🇪🇨','El Salvador':'🇸🇻','Guatemala':'🇬🇹','Honduras':'🇭🇳','Mexico':'🇲🇽','Nicaragua':'🇳🇮','Panama':'🇵🇦','Paraguay':'🇵🇾','Peru':'🇵🇪','Puerto Rico':'🇵🇷','USA Entertainment':'🇺🇸','Uruguay':'🇺🇾','Venezuela':'🇻🇪'};

let favs    = JSON.parse(localStorage.getItem('iptv_favs') || '[]');
let dead    = JSON.parse(localStorage.getItem('iptv_dead') || '[]');
let hist    = JSON.parse(localStorage.getItem('iptv_hist') || '[]');
let allCh=[],channels=[],filtered=[],activeIdx=-1,hls=null,errCount=0,delTimer=null,loadTimer=null,filterTimer=null,activeTab='all';

const TABS=[
  {label:'All',v:'all'},{label:'⭐ Favs',v:'favorites'},{label:'🕐 Recent',v:'history'},
  {label:'Sports',v:'sports'},{label:'Kids',v:'kids'},{label:'Music',v:'music'},
  {label:'LATAM',v:'latam'},{label:'🇺🇸 USA',v:'usa'},
];

async function boot() {
  try {
    const r=await fetch('./channels.json');
    if(r.ok){const d=await r.json();allCh=d.filter(c=>!dead.includes(c.url));}
  } catch(e){}
  channels=[...allCh];
  buildTabs();buildCountryFilter();filterChannels();bindKeys();
}

function buildTabs(){
  const w=document.getElementById('qtabs');
  TABS.forEach(t=>{
    const b=document.createElement('button');
    b.className='qtab'+(t.v==='all'?' on':'');
    b.textContent=t.label;b.dataset.v=t.v;
    b.onclick=()=>{activeTab=t.v;document.querySelectorAll('.qtab').forEach(x=>x.classList.remove('on'));b.classList.add('on');filterChannels();};
    w.appendChild(b);
  });
}

function buildCountryFilter(){
  const sel=document.getElementById('group-filter');
  [...new Set(channels.map(c=>c.group))].sort().forEach(g=>{
    const o=document.createElement('option');
    o.value=g;o.textContent=(FLAGS[g]?FLAGS[g]+' ':'')+g;
    sel.appendChild(o);
  });
}

function filterChannels(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const grp=document.getElementById('group-filter').value;
  filtered=channels.filter(ch=>{
    if(q&&!ch.name.toLowerCase().includes(q)&&!ch.group.toLowerCase().includes(q))return false;
    if(grp&&ch.group!==grp)return false;
    if(activeTab==='favorites')return favs.includes(ch.url);
    if(activeTab==='history')  return hist.includes(ch.url);
    if(activeTab==='sports')   return /sport/i.test(ch.group);
    if(activeTab==='usa')      return ch.group==='USA Entertainment';
    if(activeTab==='kids')     return /kids|animation/i.test(ch.group);
    if(activeTab==='music')    return /music/i.test(ch.group);
    if(activeTab==='latam')    return FLAGS[ch.group]&&ch.group!=='USA Entertainment';
    return true;
  });
  if(activeTab==='history')filtered.sort((a,b)=>hist.indexOf(a.url)-hist.indexOf(b.url));
  document.getElementById('ch-count').textContent=filtered.length+' ch';
  renderList();
}

function debouncedFilter(){clearTimeout(filterTimer);filterTimer=setTimeout(filterChannels,160);}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderList(){
  const list=document.getElementById('ch-list');
  if(!filtered.length){
    list.innerHTML=`<div class="empty">${activeTab==='favorites'?'No favorites yet<br><small>Star a channel to save it here</small>':activeTab==='history'?'No history yet<br><small>Watch a channel to see it here</small>':'No channels found'}</div>`;
    return;
  }
  const activeCh=filtered[activeIdx];
  list.innerHTML=filtered.map((ch,i)=>{
    const isOn=activeCh&&activeCh.url===ch.url;
    const isFav=favs.includes(ch.url);
    const flag=FLAGS[ch.group]||'';
    const ph=`<svg class="ch-logo-ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>`;
    return `<div class="ch-item${isOn?' on':''}" data-i="${i}" onclick="playAt(${i})" tabindex="0" onkeydown="if(event.key==='Enter')playAt(${i})">
      <div class="ch-logo-box">${ch.logo?`<img class="ch-logo" src="${esc(ch.logo)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display=''">${ph}`:ph}</div>
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-grp">${flag?flag+' ':''}${esc(ch.group)}</div>
      </div>
      <div class="ch-actions">
        <button class="ch-btn ch-fav${isFav?' on':''}" title="Favorite" onclick="event.stopPropagation();toggleFav(${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="ch-btn ch-del" title="Remove" onclick="event.stopPropagation();removeCh(${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
  scrollActive();
}

function scrollActive(){const el=document.querySelector('.ch-item.on');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});}

function playAt(i){
  if(i<0||i>=filtered.length)return;
  activeIdx=i;
  const ch=filtered[i];
  startPlay(ch);updatePlayerBar(ch);addToHist(ch.url);
  document.querySelectorAll('.ch-item').forEach((el,idx)=>el.classList.toggle('on',idx===i));
  scrollActive();
}

function addToHist(url){hist=[url,...hist.filter(u=>u!==url)].slice(0,30);localStorage.setItem('iptv_hist',JSON.stringify(hist));}

function startPlay(ch){
  clearTimer();clearLoadTimer();errCount=0;
  const vid=document.getElementById('video'),sp=document.getElementById('spinner');
  document.getElementById('no-ch').classList.add('hidden');
  document.getElementById('live-badge').classList.add('hidden');
  vid.style.display='block';sp.style.display='block';
  if(hls){hls.destroy();hls=null;}
  // auto-remove if stream hangs with no signal within LOAD_TIMEOUT
  loadTimer=setTimeout(()=>{sp.style.display='none';toast(`No signal: ${esc(ch.name)}`,'error',3500);doRemove(ch.url,true);},LOAD_TIMEOUT);
  if(Hls.isSupported()){
    hls=new Hls(HLS_CFG);hls.loadSource(ch.url);hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{clearLoadTimer();sp.style.display='none';document.getElementById('live-badge').classList.remove('hidden');vid.play().catch(()=>{});});
    hls.on(Hls.Events.ERROR,(_,d)=>{
      if(!d.fatal)return;errCount++;
      if(errCount<MAX_ERRORS){hls.destroy();hls=new Hls(HLS_CFG);hls.loadSource(ch.url);hls.attachMedia(vid);}
      else{clearLoadTimer();sp.style.display='none';scheduleAutoDel(ch);}
    });
  }else if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src=ch.url;
    vid.addEventListener('loadedmetadata',()=>{clearLoadTimer();sp.style.display='none';document.getElementById('live-badge').classList.remove('hidden');vid.play().catch(()=>{});},{once:true});
    vid.addEventListener('error',()=>{errCount++;if(errCount>=MAX_ERRORS){clearLoadTimer();scheduleAutoDel(ch);}});
  }
}

function scheduleAutoDel(ch){showErrBanner(ch);delTimer=setTimeout(()=>doRemove(ch.url,true),AUTO_DEL_DELAY);}
function clearTimer(){if(delTimer){clearTimeout(delTimer);delTimer=null;}removeErrBanner();}
function clearLoadTimer(){if(loadTimer){clearTimeout(loadTimer);loadTimer=null;}}

function showErrBanner(ch){
  removeErrBanner();
  const b=document.createElement('div');b.className='err-toast';b.id='err-banner';
  b.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Dead stream — removing in 8s: <strong>${esc(ch.name)}</strong></span><button class="t-btn" onclick="keepCh()">Keep</button><button class="t-btn" onclick="doRemove('${ch.url.replace(/'/g,"\\'")}',true)">Remove now</button>`;
  document.getElementById('vwrap').appendChild(b);
}
function removeErrBanner(){document.getElementById('err-banner')?.remove();}
function keepCh(){clearTimer();toast('Channel kept','info');}

function doRemove(url,autoSkip){
  clearTimer();
  const ch=channels.find(c=>c.url===url);
  channels=channels.filter(c=>c.url!==url);
  allCh=allCh.filter(c=>c.url!==url);
  dead.push(url);localStorage.setItem('iptv_dead',JSON.stringify(dead));
  toast(`Removed: ${ch?ch.name:'channel'}`,'error');
  filtered=filtered.filter(c=>c.url!==url);
  document.getElementById('ch-count').textContent=filtered.length+' ch';
  if(autoSkip){if(activeIdx>=filtered.length)activeIdx=filtered.length-1;filtered.length>0&&activeIdx>=0?playAt(activeIdx):resetPlayer();}
  renderList();
}

function removeCh(i){
  const ch=filtered[i];if(!ch)return;
  const wasActive=i===activeIdx;
  doRemove(ch.url,false);
  if(wasActive){filtered.length>0?(activeIdx>=filtered.length&&(activeIdx=filtered.length-1),playAt(activeIdx)):resetPlayer();}
  else{if(activeIdx>i)activeIdx--;renderList();}
}

function deleteActiveCh(){if(activeIdx<0||!filtered[activeIdx])return;clearTimer();removeErrBanner();removeCh(activeIdx);}

function toggleFav(i){
  const ch=filtered[i];if(!ch)return;
  const idx=favs.indexOf(ch.url);
  if(idx===-1){favs.push(ch.url);toast('Added to favorites','success');}
  else{favs.splice(idx,1);toast('Removed from favorites','info');}
  localStorage.setItem('iptv_favs',JSON.stringify(favs));
  const item=document.querySelector(`.ch-item[data-i="${i}"]`);
  if(item){const btn=item.querySelector('.ch-fav');const isFav=favs.includes(ch.url);btn.classList.toggle('on',isFav);btn.querySelector('svg').setAttribute('fill',isFav?'currentColor':'none');}
  if(i===activeIdx)syncFavBtn(ch.url);
}

function toggleActiveFav(){if(activeIdx<0||!filtered[activeIdx])return;toggleFav(activeIdx);}

function syncFavBtn(url){
  const isFav=favs.includes(url);
  document.getElementById('btn-fav').classList.toggle('fav-on',isFav);
  document.getElementById('fav-lbl').textContent=isFav?'Unfav':'Fav';
  document.getElementById('fav-icon').setAttribute('fill',isFav?'currentColor':'none');
}

function copyUrl(){
  const ch=filtered[activeIdx];if(!ch)return;
  navigator.clipboard.writeText(ch.url).then(()=>toast('URL copied!','success',2000),()=>toast('Copy failed','error',2000));
}

function updatePlayerBar(ch){
  document.getElementById('pb-name').textContent=ch.name;
  document.getElementById('pb-grp').textContent=(FLAGS[ch.group]?FLAGS[ch.group]+' ':'')+ch.group;
  document.getElementById('pb-info').style.display='block';
  const lbox=document.getElementById('pb-logo-box'),limg=document.getElementById('pb-logo');
  if(ch.logo){limg.src=ch.logo;limg.style.display='';lbox.style.display='flex';}else{lbox.style.display='none';}
  ['btn-fav','btn-dead','btn-prev','btn-next','btn-copy'].forEach(id=>document.getElementById(id).disabled=false);
  document.getElementById('btn-prev').disabled=activeIdx<=0;
  document.getElementById('btn-next').disabled=activeIdx>=filtered.length-1;
  syncFavBtn(ch.url);
}

function resetPlayer(){
  clearLoadTimer();
  if(hls){hls.destroy();hls=null;}
  const vid=document.getElementById('video');
  vid.pause();vid.removeAttribute('src');vid.style.display='none';
  document.getElementById('no-ch').classList.remove('hidden');
  document.getElementById('live-badge').classList.add('hidden');
  document.getElementById('spinner').style.display='none';
  document.getElementById('pb-info').style.display='none';
  document.getElementById('pb-logo-box').style.display='none';
  ['btn-fav','btn-dead','btn-prev','btn-next','btn-copy'].forEach(id=>document.getElementById(id).disabled=true);
  activeIdx=-1;renderList();
}

function prevCh(){if(activeIdx>0)playAt(activeIdx-1);}
function nextCh(){if(activeIdx<filtered.length-1)playAt(activeIdx+1);}

function parseM3U(text,fallbackGroup){
  const lines=text.split('\n');const result=[];let i=0;
  while(i<lines.length){
    const line=lines[i].trim();
    if(line.startsWith('#EXTINF')){
      const nameM=line.match(/,(.+)$/);
      const logoM=line.match(/tvg-logo="([^"]*)"/);
      const grpM=line.match(/group-title="([^"]*)"/);
      const name=nameM?nameM[1].trim():'';
      const logo=logoM?logoM[1].trim():'';
      const group=grpM?grpM[1].trim():(fallbackGroup||'Custom');
      i++;while(i<lines.length&&!lines[i].trim())i++;
      const url=lines[i]?lines[i].trim():'';
      if(url&&!url.startsWith('#')&&name)result.push({name,logo,group,url});
    }
    i++;
  }
  return result;
}

function mergePlaylist(newChs){
  const existing=new Set(channels.map(c=>c.url));
  const added=newChs.filter(c=>!existing.has(c.url));
  channels=[...channels,...added];allCh=[...allCh,...added];
  const sel=document.getElementById('group-filter');
  const exGroups=new Set([...sel.options].map(o=>o.value));
  [...new Set(added.map(c=>c.group))].forEach(g=>{
    if(!exGroups.has(g)){const o=document.createElement('option');o.value=g;o.textContent=(FLAGS[g]?FLAGS[g]+' ':'')+g;sel.appendChild(o);}
  });
  return added.length;
}

function showPlModal(){document.getElementById('pl-modal').classList.remove('hidden');}
function hidePlModal(){document.getElementById('pl-modal').classList.add('hidden');}

function loadPlaylist(){
  const url=document.getElementById('pl-url').value.trim();
  const file=document.getElementById('pl-file').files[0];
  if(url){
    fetch(url).then(r=>r.text()).then(text=>{
      const n=mergePlaylist(parseM3U(text,'Custom'));filterChannels();hidePlModal();toast(`Loaded ${n} new channels`,'success');
    }).catch(()=>toast('Failed to load URL','error'));
  }else if(file){
    const reader=new FileReader();
    reader.onload=e=>{const n=mergePlaylist(parseM3U(e.target.result,file.name.replace(/\.m3u8?$/i,'')));filterChannels();hidePlModal();toast(`Loaded ${n} new channels`,'success');};
    reader.readAsText(file);
  }else{toast('Enter a URL or pick a file','info');}
}

function toast(msg,type='info',ms=3200){
  const wrap=document.getElementById('toast-wrap');
  const el=document.createElement('div');el.className=`toast ${type}`;
  const ic=type==='success'?'✓':type==='error'?'✕':'i';
  el.innerHTML=`<span style="font-size:10px;font-weight:800;opacity:.7">${ic}</span>${esc(msg)}`;
  wrap.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),180);},ms);
}

function showModal(){document.getElementById('modal').classList.remove('hidden');}
function hideModal(){document.getElementById('modal').classList.add('hidden');}

function bindKeys(){
  document.addEventListener('keydown',e=>{
    const inInput=['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName);
    if(e.key==='Escape'){
      if(!document.getElementById('modal').classList.contains('hidden')){hideModal();return;}
      if(!document.getElementById('pl-modal').classList.contains('hidden')){hidePlModal();return;}
      if(inInput){document.getElementById('search').value='';document.activeElement.blur();filterChannels();}
      return;
    }
    if(inInput)return;
    if(e.key==='ArrowUp'){e.preventDefault();prevCh();return;}
    if(e.key==='ArrowDown'){e.preventDefault();nextCh();return;}
    if(e.key==='/'){e.preventDefault();document.getElementById('search').focus();return;}
    if(e.key==='?'){showModal();return;}
    if(e.key==='f'||e.key==='F'){toggleActiveFav();return;}
    if(e.key==='Delete'){deleteActiveCh();return;}
    if(e.key===' '){e.preventDefault();const v=document.getElementById('video');v.paused?v.play().catch(()=>{}):v.pause();return;}
    if(e.key==='m'||e.key==='M'){const v=document.getElementById('video');v.muted=!v.muted;toast(v.muted?'Muted':'Unmuted','info',1400);}
  });
}

boot();
</script>
</body>
