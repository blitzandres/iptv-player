<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
:root {
  --bg: #09090f;
  --surface: #0f0f1a;
  --card: #14141f;
  --border: rgba(255,255,255,0.07);
  --accent: #e50914;
  --accent-dim: rgba(229,9,20,0.1);
  --accent-glow: rgba(229,9,20,0.2);
  --text-1: #f0f0f8;
  --text-2: #8e8ea8;
  --text-3: #4e4e68;
  --gold: #f5c542;
  --green: #22c55e;
  --sidebar-w: 260px;
  --topbar-h: 52px;
  --playerbar-h: 48px;
  --r: 7px;
  --r-sm: 5px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 3px; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ─── Topbar ─────────────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
  user-select: none;
  letter-spacing: -0.01em;
}

.search-wrap {
  flex: 1;
  max-width: 300px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
  width: 14px;
  height: 14px;
  display: flex;
}

#search {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 10px 7px 30px;
  color: var(--text-1);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}

#search:focus { border-color: rgba(229,9,20,0.35); }
#search::placeholder { color: var(--text-3); }

.topbar-selects { display: flex; gap: 6px; }

.filter-select {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 10px;
  color: var(--text-2);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
  max-width: 148px;
  transition: border-color 0.15s;
}

.filter-select:focus { border-color: rgba(229,9,20,0.35); }
.filter-select option { background: #1a1a2e; }

.ch-count {
  font-size: 11px;
  color: var(--text-3);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  min-width: 42px;
  text-align: right;
}

.kbd-hint {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text-3);
  padding: 4px 8px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}

.kbd-hint:hover { color: var(--text-1); border-color: var(--text-3); }

/* ─── Layout ─────────────────────────────────────────────────────── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ─── Sidebar ────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
}

.quick-tabs {
  display: flex;
  gap: 3px;
  padding: 8px 10px;
  overflow-x: auto;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}

.quick-tabs::-webkit-scrollbar { display: none; }

.qtab {
  background: none;
  border: 1px solid transparent;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  color: var(--text-3);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  flex-shrink: 0;
}

.qtab:hover { color: var(--text-2); border-color: var(--border); }
.qtab.on { background: var(--accent-dim); color: var(--accent); border-color: rgba(229,9,20,0.25); }

.channel-list {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: #252538 transparent;
}

.channel-list::-webkit-scrollbar { width: 4px; }
.channel-list::-webkit-scrollbar-thumb { background: #252538; border-radius: 2px; }

.ch-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.025);
  transition: background 0.1s;
  position: relative;
  min-height: 52px;
}

.ch-item:hover { background: rgba(255,255,255,0.03); }

.ch-item.on {
  background: var(--accent-dim);
  border-left: 2px solid var(--accent);
  padding-left: 10px;
}

.ch-logo-box {
  width: 42px;
  height: 30px;
  flex-shrink: 0;
  background: var(--card);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.ch-logo {
  width: 40px;
  height: 28px;
  object-fit: contain;
}

.ch-logo-ph { width: 18px; height: 18px; color: var(--text-3); }

.ch-info { flex: 1; min-width: 0; }

.ch-name {
  font-size: 12.5px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
  color: var(--text-1);
}

.ch-grp {
  font-size: 10.5px;
  color: var(--text-3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
  line-height: 1;
}

.ch-actions {
  display: flex;
  align-items: center;
  gap: 1px;
  flex-shrink: 0;
}

.ch-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.15s, background 0.15s, opacity 0.15s;
}

.ch-fav { color: var(--text-3); opacity: 0.45; }
.ch-fav:hover { color: var(--gold); background: rgba(245,197,66,0.1); opacity: 1; }
.ch-fav.on { color: var(--gold); opacity: 1; }

.ch-del { color: var(--text-3); opacity: 0; }
.ch-item:hover .ch-del { opacity: 0.4; }
.ch-del:hover { color: var(--accent); background: var(--accent-dim); opacity: 1 !important; }

/* ─── Player ─────────────────────────────────────────────────────── */
.player-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #000;
  min-width: 0;
}

.video-wrap {
  flex: 1;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
}

.no-ch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--text-3);
  user-select: none;
  pointer-events: none;
}

.no-ch svg { width: 44px; height: 44px; opacity: 0.2; }
.no-ch p { font-size: 14px; font-weight: 500; opacity: 0.6; }
.no-ch small { font-size: 11px; opacity: 0.35; }

.spinner {
  position: absolute;
  width: 34px;
  height: 34px;
  border: 2.5px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Player bar ─────────────────────────────────────────────────── */
.player-bar {
  height: var(--playerbar-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  flex-shrink: 0;
}

.pb-logo-box {
  width: 38px;
  height: 28px;
  background: var(--card);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.pb-logo { width: 36px; height: 26px; object-fit: contain; }

.pb-info { flex: 1; min-width: 0; }
.pb-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pb-grp { font-size: 10px; color: var(--text-3); margin-top: 1px; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  color: var(--green);
  padding: 3px 8px;
  background: rgba(34,197,94,0.09);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: 20px;
  letter-spacing: 0.03em;
  white-space: nowrap;
  flex-shrink: 0;
}

.live-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

.pb-btns { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }

.pb-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text-2);
  padding: 5px 9px;
  font-size: 11.5px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
}

.pb-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
.pb-btn:hover:not(:disabled) { background: #1a1a2e; color: var(--text-1); border-color: rgba(255,255,255,0.14); }
.pb-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.pb-btn.fav-on { background: rgba(245,197,66,0.1); color: var(--gold); border-color: rgba(245,197,66,0.22); }
.pb-btn.danger { color: #f87171; }
.pb-btn.danger:hover:not(:disabled) { background: rgba(229,9,20,0.1); border-color: rgba(229,9,20,0.25); color: #fc8585; }

/* ─── Error/auto-delete toast ────────────────────────────────────── */
.err-toast {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(8,8,18,0.92);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(229,9,20,0.35);
  border-radius: var(--r);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--text-1);
  white-space: nowrap;
  z-index: 30;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.55);
  animation: slideUp 0.2s ease-out;
}

@keyframes slideUp {
  from { opacity:0; transform: translateX(-50%) translateY(10px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}

.err-toast .t-btn {
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.13);
  color: var(--text-1);
  border-radius: 4px;
  padding: 3px 9px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: background 0.15s;
}

.err-toast .t-btn:hover { background: rgba(255,255,255,0.16); }

/* ─── Toasts ──────────────────────────────────────────────────────── */
.toast-wrap {
  position: fixed;
  bottom: calc(var(--playerbar-h) + 12px);
  right: 14px;
  z-index: 99;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}

.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 13px;
  font-size: 12px;
  color: var(--text-1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.45);
  animation: tIn 0.18s ease-out;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 7px;
  max-width: 270px;
  line-height: 1.4;
}

.toast.success { border-left: 3px solid var(--green); }
.toast.error   { border-left: 3px solid var(--accent); }
.toast.info    { border-left: 3px solid #6366f1; }
.toast.out     { animation: tOut 0.18s ease-in forwards; }

@keyframes tIn  { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
@keyframes tOut { to  {opacity:0;transform:translateX(14px)} }

/* ─── Shortcuts modal ────────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(5px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}

.overlay.hidden { display: none; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 12px;
  padding: 22px 24px;
  width: 360px;
  max-width: calc(100vw - 28px);
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  animation: scaleIn 0.15s ease;
}

@keyframes scaleIn { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }

.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.modal-head h3 { font-size: 14px; font-weight: 600; }

.modal-close {
  background: none;
  border: none;
  color: var(--text-3);
  cursor: pointer;
  padding: 2px;
  display: flex;
  align-items: center;
  border-radius: 3px;
  transition: color 0.15s;
}

.modal-close:hover { color: var(--text-1); }

.sc-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  row-gap: 9px;
  column-gap: 14px;
  align-items: center;
}

.kbd {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 3px 7px;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  color: var(--text-1);
  white-space: nowrap;
  justify-self: start;
}

.sc-desc { font-size: 12px; color: var(--text-2); }

/* ─── Misc ───────────────────────────────────────────────────────── */
.empty { padding: 24px 14px; text-align: center; color: var(--text-3); font-size: 12px; }
.hidden { display: none !important; }

@media (max-width: 580px) {
  :root { --sidebar-w: 200px; }
  .topbar-selects, .kbd-hint, .ch-count { display: none; }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
    IPTV
  </div>
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </span>
    <input type="text" id="search" placeholder="Search channels… (/)" oninput="filterChannels()" autocomplete="off" spellcheck="false" />
  </div>
  <div class="topbar-selects">
    <select class="filter-select" id="group-filter" onchange="filterChannels()">
      <option value="">All countries</option>
    </select>
    <select class="filter-select" id="quick-filter" onchange="qSync()">
      <option value="all">All</option>
      <option value="favorites">Favorites</option>
      <option value="sports">Sports</option>
      <option value="latam">Latin America</option>
      <option value="usa">USA</option>
      <option value="kids">Kids</option>
    </select>
  </div>
  <span class="ch-count" id="ch-count"></span>
  <button class="kbd-hint" onclick="showModal()" title="Keyboard shortcuts">⌨ Keys</button>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="quick-tabs" id="qtabs"></div>
    <div class="channel-list" id="ch-list"></div>
  </div>

  <!-- Player -->
  <div class="player-area">
    <div class="video-wrap" id="vwrap">
      <div class="no-ch" id="no-ch">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <p>Pick a channel</p>
        <small>↑ ↓ arrows to navigate</small>
      </div>
      <div class="spinner" id="spinner"></div>
      <video id="video" controls playsinline></video>
    </div>

    <div class="player-bar">
      <div class="pb-logo-box" id="pb-logo-box" style="display:none">
        <img class="pb-logo" id="pb-logo" src="" alt="" onerror="this.style.display='none'">
      </div>
      <div class="pb-info" id="pb-info" style="display:none">
        <div class="pb-name" id="pb-name">—</div>
        <div class="pb-grp" id="pb-grp"></div>
      </div>
      <div class="live-badge hidden" id="live-badge"><span class="live-dot"></span>LIVE</div>
      <div class="pb-btns">
        <button class="pb-btn" id="btn-prev" onclick="prevCh()" disabled title="Previous ↑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Prev
        </button>
        <button class="pb-btn" id="btn-next" onclick="nextCh()" disabled title="Next ↓">
          Next
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="pb-btn" id="btn-fav" onclick="toggleActiveFav()" disabled title="Favorite (F)">
          <svg id="fav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span id="fav-lbl">Fav</span>
        </button>
        <button class="pb-btn danger" id="btn-dead" onclick="deleteActiveCh()" disabled title="Mark dead & skip (Delete)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          Dead
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast stack -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Shortcuts modal -->
<div class="overlay hidden" id="modal" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <div class="modal-head">
      <h3>Keyboard Shortcuts</h3>
      <button class="modal-close" onclick="hideModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sc-grid">
      <span class="kbd">↑ / ↓</span><span class="sc-desc">Previous / Next channel</span>
      <span class="kbd">Enter</span><span class="sc-desc">Play focused channel</span>
      <span class="kbd">F</span><span class="sc-desc">Toggle favorite</span>
      <span class="kbd">Delete</span><span class="sc-desc">Mark dead & skip</span>
      <span class="kbd">/</span><span class="sc-desc">Focus search</span>
      <span class="kbd">Esc</span><span class="sc-desc">Clear search / Close</span>
      <span class="kbd">Space</span><span class="sc-desc">Pause / Resume</span>
      <span class="kbd">M</span><span class="sc-desc">Toggle mute</span>
      <span class="kbd">?</span><span class="sc-desc">This help</span>
    </div>
  </div>
</div>

<script>
// ── HLS config ──────────────────────────────────────────────────────────────
const HLS_CFG = {
  maxBufferLength: 20,
  maxMaxBufferLength: 40,
  manifestLoadingTimeOut: 8000,
  manifestLoadingMaxRetry: 1,
  levelLoadingTimeOut: 8000,
  levelLoadingMaxRetry: 1,
  fragLoadingTimeOut: 12000,
  fragLoadingMaxRetry: 2,
  startFragPrefetch: true,
  progressive: true,
};

const MAX_ERRORS = 3;

// ── Quick tabs ───────────────────────────────────────────────────────────────
const TABS = [
  { label: 'All',    v: 'all' },
  { label: '⭐ Favs', v: 'favorites' },
  { label: 'Sports', v: 'sports' },
  { label: 'USA',    v: 'usa' },
  { label: 'LATAM',  v: 'latam' },
  { label: 'Kids',   v: 'kids' },
];

function buildTabs() {
  const wrap = document.getElementById('qtabs');
  TABS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'qtab' + (t.v === 'all' ? ' on' : '');
    b.textContent = t.label;
    b.dataset.v = t.v;
    b.onclick = () => {
      document.querySelectorAll('.qtab').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      document.getElementById('quick-filter').value = t.v;
      filterChannels();
    };
    wrap.appendChild(b);
  });
}

function qSync() { filterChannels(); }

function buildCountryFilter() {
  const sel = document.getElementById('group-filter');
  [...new Set(channels.map(c => c.group))].sort().forEach(g => {
    const o = document.createElement('option');
    o.value = g; o.textContent = g;
    sel.appendChild(o);
  });
}

// ── Filter & render ──────────────────────────────────────────────────────────
function filterChannels() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const grp = document.getElementById('group-filter').value;
  const qf  = document.getElementById('quick-filter').value;

  // sync tab state
  document.querySelectorAll('.qtab').forEach(b =>
    b.classList.toggle('on', b.dataset.v === qf)
  );

  filtered = channels.filter(ch => {
    if (q && !ch.name.toLowerCase().includes(q) && !ch.group.toLowerCase().includes(q)) return false;
    if (grp && ch.group !== grp) return false;
    if (qf === 'favorites') return favs.includes(ch.url);
    if (qf === 'sports')    return ch.group.toLowerCase().includes('sport');
    if (qf === 'usa')       return ch.group === 'USA Entertainment';
    if (qf === 'latam')     return ch.group !== 'USA Entertainment' && ch.group !== 'Sports';
    if (qf === 'kids')      return /kids?|infant|child/i.test(ch.group);
    return true;
  });

  document.getElementById('ch-count').textContent = filtered.length + ' ch';
  renderList();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderList() {
  const list = document.getElementById('ch-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No channels found</div>';
    return;
  }
  const activeCh = filtered[activeIdx];
  list.innerHTML = filtered.map((ch, i) => {
    const isOn  = activeCh && activeCh.url === ch.url;
    const isFav = favs.includes(ch.url);
    return `<div class="ch-item${isOn ? ' on' : ''}" data-i="${i}" onclick="playAt(${i})" tabindex="0" onkeydown="if(event.key==='Enter')playAt(${i})">
      <div class="ch-logo-box">
        ${ch.logo
          ? `<img class="ch-logo" src="${esc(ch.logo)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display=''">`
          : ''}
        <svg class="ch-logo-ph" ${ch.logo ? 'style="display:none"' : ''} viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
      </div>
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-grp">${esc(ch.group)}</div>
      </div>
      <div class="ch-actions">
        <button class="ch-btn ch-fav${isFav ? ' on' : ''}" title="Favorite" onclick="event.stopPropagation();toggleFav(${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="ch-btn ch-del" title="Remove (dead)" onclick="event.stopPropagation();removeCh(${i})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
  scrollActive();
}

function scrollActive() {
  const el = document.querySelector('.ch-item.on');
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ── Playback ─────────────────────────────────────────────────────────────────
function playAt(i) {
  if (i < 0 || i >= filtered.length) return;
  activeIdx = i;
  const ch = filtered[i];
  startPlay(ch);
  updatePlayerBar(ch);
  // update active state without full re-render
  document.querySelectorAll('.ch-item').forEach((el, idx) =>
    el.classList.toggle('on', idx === i)
  );
  scrollActive();
}

function startPlay(ch) {
  clearTimer();
  errCount = 0;
  const vid = document.getElementById('video');
  const sp  = document.getElementById('spinner');
  document.getElementById('no-ch').classList.add('hidden');
  document.getElementById('live-badge').classList.add('hidden');
  vid.style.display = 'block';
  sp.style.display = 'block';

  if (hls) { hls.destroy(); hls = null; }

  if (Hls.isSupported()) {
    hls = new Hls(HLS_CFG);
    hls.loadSource(ch.url);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      sp.style.display = 'none';
      document.getElementById('live-badge').classList.remove('hidden');
      vid.play().catch(() => {});
    });
    hls.on(Hls.Events.ERROR, (_, d) => {
      if (!d.fatal) return;
      errCount++;
      if (errCount < MAX_ERRORS) {
        hls.destroy();
        hls = new Hls(HLS_CFG);
        hls.loadSource(ch.url);
        hls.attachMedia(vid);
      } else {
        sp.style.display = 'none';
        scheduleAutoDel(ch);
      }
    });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = ch.url;
    vid.addEventListener('loadedmetadata', () => {
      sp.style.display = 'none';
      document.getElementById('live-badge').classList.remove('hidden');
      vid.play().catch(() => {});
    }, { once: true });
    vid.addEventListener('error', () => {
      errCount++;
      if (errCount >= MAX_ERRORS) scheduleAutoDel(ch);
    });
  }
}

function scheduleAutoDel(ch) {
  showErrBanner(ch);
  delTimer = setTimeout(() => doRemove(ch.url, true), AUTO_DEL_DELAY);
}

function clearTimer() {
  if (delTimer) { clearTimeout(delTimer); delTimer = null; }
  removeErrBanner();
}

function showErrBanner(ch) {
  removeErrBanner();
  const b = document.createElement('div');
  b.className = 'err-toast';
  b.id = 'err-banner';
  b.innerHTML = `
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e50914" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Dead stream — auto-removing in 8s: <strong>${esc(ch.name)}</strong></span>
    <button class="t-btn" onclick="keepCh()">Keep</button>
    <button class="t-btn" onclick="doRemove('${ch.url.replace(/'/g,"\\'")}',true)">Remove now</button>
  `;
  document.getElementById('vwrap').appendChild(b);
}

function removeErrBanner() {
  const b = document.getElementById('err-banner');
  if (b) b.remove();
}

function keepCh() {
  clearTimer();
  toast('Channel kept', 'info');
}

// ── Channel management ───────────────────────────────────────────────────────
function doRemove(url, autoSkip) {
  clearTimer();
  const ch = channels.find(c => c.url === url);
  channels = channels.filter(c => c.url !== url);
  dead.push(url);
  localStorage.setItem('iptv_dead', JSON.stringify(dead));
  toast(`Removed: ${ch ? ch.name : 'channel'}`, 'error');
  // rebuild filtered list
  const q = document.getElementById('search').value.trim().toLowerCase();
  const grp = document.getElementById('group-filter').value;
  const qf  = document.getElementById('quick-filter').value;
  filtered = filtered.filter(c => c.url !== url);
  document.getElementById('ch-count').textContent = filtered.length + ' ch';
  if (autoSkip) {
    if (activeIdx >= filtered.length) activeIdx = filtered.length - 1;
    if (filtered.length > 0 && activeIdx >= 0) {
      playAt(activeIdx);
    } else {
      resetPlayer();
    }
  }
  renderList();
}

function removeCh(i) {
  const ch = filtered[i];
  if (!ch) return;
  const wasActive = i === activeIdx;
  doRemove(ch.url, false);
  if (wasActive) {
    if (filtered.length > 0) {
      if (activeIdx >= filtered.length) activeIdx = filtered.length - 1;
      playAt(activeIdx);
    } else {
      resetPlayer();
    }
  } else {
    if (activeIdx > i) activeIdx--;
    renderList();
  }
}

function deleteActiveCh() {
  if (activeIdx < 0 || !filtered[activeIdx]) return;
  clearTimer();
  removeErrBanner();
  removeCh(activeIdx);
}

// ── Favorites ─────────────────────────────────────────────────────────────────
function toggleFav(i) {
  const ch = filtered[i];
  if (!ch) return;
  const idx = favs.indexOf(ch.url);
  if (idx === -1) { favs.push(ch.url); toast('Added to favorites', 'success'); }
  else { favs.splice(idx, 1); toast('Removed from favorites', 'info'); }
  localStorage.setItem('iptv_favs', JSON.stringify(favs));
  // update button in list
  const item = document.querySelector(`.ch-item[data-i="${i}"]`);
  if (item) {
    const btn = item.querySelector('.ch-fav');
    const isFav = favs.includes(ch.url);
    btn.classList.toggle('on', isFav);
    btn.querySelector('svg').setAttribute('fill', isFav ? 'currentColor' : 'none');
  }
  // update player bar if active
  if (i === activeIdx) syncFavBtn(ch.url);
}

function toggleActiveFav() {
  if (activeIdx < 0 || !filtered[activeIdx]) return;
  toggleFav(activeIdx);
}

function syncFavBtn(url) {
  const isFav = favs.includes(url);
  document.getElementById('btn-fav').classList.toggle('fav-on', isFav);
  document.getElementById('fav-lbl').textContent = isFav ? 'Unfav' : 'Fav';
  document.getElementById('fav-icon').setAttribute('fill', isFav ? 'currentColor' : 'none');
}

// ── Player bar ─────────────────────────────────────────────────────────────────
function updatePlayerBar(ch) {
  document.getElementById('pb-name').textContent = ch.name;
  document.getElementById('pb-grp').textContent  = ch.group;
  document.getElementById('pb-info').style.display = 'block';
  const lbox = document.getElementById('pb-logo-box');
  const limg = document.getElementById('pb-logo');
  if (ch.logo) {
    limg.src = ch.logo;
    limg.style.display = '';
    lbox.style.display = 'flex';
  } else {
    lbox.style.display = 'none';
  }
  document.getElementById('btn-fav').disabled  = false;
  document.getElementById('btn-dead').disabled = false;
  document.getElementById('btn-prev').disabled = activeIdx <= 0;
  document.getElementById('btn-next').disabled = activeIdx >= filtered.length - 1;
  syncFavBtn(ch.url);
}

function resetPlayer() {
  if (hls) { hls.destroy(); hls = null; }
  const vid = document.getElementById('video');
  vid.pause(); vid.removeAttribute('src'); vid.style.display = 'none';
  document.getElementById('no-ch').classList.remove('hidden');
  document.getElementById('live-badge').classList.add('hidden');
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('pb-info').style.display = 'none';
  document.getElementById('pb-logo-box').style.display = 'none';
  ['btn-fav','btn-dead','btn-prev','btn-next'].forEach(id =>
    document.getElementById(id).disabled = true
  );
  activeIdx = -1;
  renderList();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function prevCh() { if (activeIdx > 0) playAt(activeIdx - 1); }
function nextCh() { if (activeIdx < filtered.length - 1) playAt(activeIdx + 1); }

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info', ms = 3200) {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const ic = type === 'success' ? '✓' : type === 'error' ? '✕' : 'i';
  el.innerHTML = `<span style="font-size:10px;font-weight:800;opacity:.7">${ic}</span>${esc(msg)}`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => el.remove(), 180);
  }, ms);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal() { document.getElementById('modal').classList.remove('hidden'); }
function hideModal() { document.getElementById('modal').classList.add('hidden'); }

// ── Keyboard ──────────────────────────────────────────────────────────────────
function bindKeys() {
  document.addEventListener('keydown', e => {
    const inInput = ['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName);

    if (e.key === 'Escape') {
      if (!document.getElementById('modal').classList.contains('hidden')) {
        hideModal(); return;
      }
      if (inInput) {
        document.getElementById('search').value = '';
        document.activeElement.blur();
        filterChannels();
      }
      return;
    }

    if (inInput) return;

    if (e.key === 'ArrowUp')   { e.preventDefault(); prevCh(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); nextCh(); return; }
    if (e.key === '/')         { e.preventDefault(); document.getElementById('search').focus(); return; }
    if (e.key === '?')         { showModal(); return; }
    if (e.key === 'f' || e.key === 'F') { toggleActiveFav(); return; }
    if (e.key === 'Delete')    { deleteActiveCh(); return; }

    if (e.key === ' ') {
      e.preventDefault();
      const v = document.getElementById('video');
      if (v.paused) v.play().catch(()=>{}); else v.pause();
      return;
    }

    if (e.key === 'm' || e.key === 'M') {
      const v = document.getElementById('video');
      v.muted = !v.muted;
      toast(v.muted ? 'Muted' : 'Unmuted', 'info', 1400);
    }
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
buildTabs();
buildCountryFilter();
filterChannels();
bindKeys();
</script>
</body>
</html>
